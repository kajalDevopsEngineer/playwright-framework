# ─────────────────────────────────────────────
# Kubernetes Secret for test credentials
#
# This is the EXAMPLE file - safe to commit.
# Real secrets are created by the DevOps team
# using kubectl or a secrets manager like
# HashiCorp Vault or AWS Secrets Manager.
#
# NEVER commit a secrets file with real values.
# ─────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: test-secrets
type: Opaque

# Values are base64 encoded in real secrets
# echo -n 'your-value' | base64
stringData:
  staging-url: "https://staging.yourapp.com"
  staging-username: "your_username_here"
  staging-password: "your_password_here"