name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - all

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run smoke on ALL triggers - PR, push, manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Tests
        run: npx playwright test tests/e2e/ --grep "@smoke"
        env:
          CI: true
          BASE_URL: https://opensource-demo.orangehrmlive.com
        continue-on-error: true

      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report
        if: always()

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run full regression on push to main, not on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: smoke
    # Only run regression if smoke passed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Regression Tests
        run: npx playwright test tests/e2e/ --grep "@regression"
        env:
          CI: true
          BASE_URL: https://opensource-demo.orangehrmlive.com
        continue-on-error: true

      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report
        if: always()

      - name: Upload regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-report
          path: allure-report/
          retention-days: 30